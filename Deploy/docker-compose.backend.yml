# docker compose -f docker-compose.backend.yml up -d
services:
  backend:
    image: firefly26710/ffarticles-backend:latest
    ports:
      - "21000:21000"
    environment:
      # CORS: Frontend App URL
      - AllowedOrigins__0=${UI_BASE_URL:-http://localhost:3000}
      # GmailOAuth
      - GmailOAuth__ClientId=${GMAIL_OAUTH_CLIENT_ID}
      - GmailOAuth__ClientSecret=${GMAIL_OAUTH_CLIENT_SECRET}
      - GmailOAuth__RedirectUri=${GMAIL_OAUTH_REDIRECT_URI}
      # AI Services
      - DeepSeek__ApiKey=${DEEPSEEK_API_KEY}
      - Ollama__ApiUrl=${OLLAMA_API_URL:-http://localhost:11434}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - firefly-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-rabbitmq}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-rabbitmq}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - firefly-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - firefly-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  firefly-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data: 