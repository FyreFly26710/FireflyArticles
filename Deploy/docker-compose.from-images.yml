# docker compose -f docker-compose.from-images.yml up -d
services:
  frontend:
    image: firefly26710/ffarticles-frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - firefly-network
    environment:
      # Client-side environment variables (used in browser)
      - NEXT_PUBLIC_GOOGLE_REDIRECT_URL=${GMAIL_OAUTH_REDIRECT_URI}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GMAIL_OAUTH_CLIENT_ID}
      - NEXT_PUBLIC_BASE_URL=https://localhost:21000
      # Server-side environment variables (used in SSR)
      - SERVER_API_URL=https://backend:21000
    extra_hosts:
      - "localhost:host-gateway"

  backend:
    image: firefly26710/ffarticles-backend:latest
    ports:
      - "21000:21000"
    environment:
      # CORS: Frontend App URL
      - AllowedOrigins__0=http://localhost:3000
      - AllowedOrigins__1=https://localhost:3000
      # GmailOAuth
      - GmailOAuth__ClientId=${GMAIL_OAUTH_CLIENT_ID}
      - GmailOAuth__ClientSecret=${GMAIL_OAUTH_CLIENT_SECRET}
      - GmailOAuth__RedirectUri=${GMAIL_OAUTH_REDIRECT_URI}
      # AI Services
      - DeepSeek__ApiKey=${DEEPSEEK_API_KEY}
      - Ollama__ApiUrl=http://host.docker.internal:11434
      # Database credentials
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-rabbitmq}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-rabbitmq}
      # HTTPS Configuration
      - ASPNETCORE_URLS=https://+:21000;http://+:21000
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=YourSecurePassword
    volumes:
      - https-certs:/https:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - firefly-network
    extra_hosts:
      - "localhost:host-gateway"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USERNAME:-rabbitmq}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-rabbitmq}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - firefly-network
    # Add memory limits to prevent OOM issues
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "15672:15672"  # Management UI
      - "5672:5672"    # AMQP port

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - firefly-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgweb:
    image: sosedoff/pgweb
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - firefly-network

networks:
  firefly-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  https-certs: 