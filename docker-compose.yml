# docker compose build --no-cache
# docker compose up -d

services:
  frontend:
    build:
      context: ./FrontendReact/ff-articles-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${GMAIL_OAUTH_REDIRECT_URI}
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GMAIL_OAUTH_CLIENT_ID}
        - NEXT_PUBLIC_BASE_URL=http://localhost:21000
    depends_on:
      - backend
    networks:
      - firefly-network
    ports:
      - "3000:3000"
    extra_hosts:
      - "localhost:host-gateway"

  backend:
    build:
      context: ./BackendDotNet/FF.Articles.Backend
      dockerfile: Dockerfile
    environment:
      # CORS: Frontend App URL
      - AllowedOrigins__0=http://localhost:3000
      # GmailOAuth
      - GmailOAuth__ClientId=${GMAIL_OAUTH_CLIENT_ID}
      - GmailOAuth__ClientSecret=${GMAIL_OAUTH_CLIENT_SECRET}
      - GmailOAuth__RedirectUri=${GMAIL_OAUTH_REDIRECT_URI}
      # AI Services
      - DeepSeek__ApiKey=${DEEPSEEK_API_KEY}
      # - Ollama__ApiUrl=${OLLAMA_API_URL}
      # Database credentials
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-rabbitmq}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-rabbitmq}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - firefly-network
    ports:
      - "21000:21000"
    extra_hosts:
      - "localhost:host-gateway"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USERNAME:-rabbitmq}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-rabbitmq}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - firefly-network
    # Add memory limits to prevent OOM issues
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "15672:15672"  # Management UI
      - "5672:5672"    # AMQP port

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - firefly-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgweb:
    image: sosedoff/pgweb
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - firefly-network

networks:
  firefly-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:


# Example .env file contents:
# NEXT_PUBLIC_BASE_URL=http://localhost:3000
# GMAIL_OAUTH_CLIENT_ID=xxx
# GMAIL_OAUTH_CLIENT_SECRET=xxx
# GMAIL_OAUTH_REDIRECT_URI=xxx
# OLLAMA_API_URL=http://localhost:11434
# DEEPSEEK_API_KEY=xxx
# POSTGRES_PASSWORD=postgres
# RABBITMQ_USERNAME=rabbitmq
# RABBITMQ_PASSWORD=rabbitmq
